<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resource Management - Office Build-Out</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <script src="../apexgantt.min.js"></script>
    <style>
      body {
        max-width: 1000px;
        margin: 0 auto;
        font-family: 'Inter', sans-serif;
        background: #fff;
        padding: 20px 0;
      }
      h2 {
        font-size: 22px;
        font-weight: 700;
        color: #1a1a2e;
        margin: 0 0 4px 0;
        line-height: 1.3;
      }
      .subtitle {
        font-size: 13px;
        color: #888;
        margin-bottom: 16px;
      }
      .legend {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        margin-bottom: 16px;
        font-size: 12px;
        color: #475569;
      }
      .legend-item {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .legend-swatch {
        width: 24px;
        height: 10px;
        border-radius: 3px;
      }
    </style>
  </head>
  <body>
    <h2>Office Build-Out — Team Allocation</h2>
    <p class="subtitle">
      Color-coded by trade/team using per-task
      <code>barBackgroundColor</code> to visualize resource allocation across parallel work streams
    </p>
    <div class="legend">
      <div class="legend-item">
        <div class="legend-swatch" style="background: #3b82f6"></div>
        <span>Architecture</span>
      </div>
      <div class="legend-item">
        <div class="legend-swatch" style="background: #f59e0b"></div>
        <span>General Contractor</span>
      </div>
      <div class="legend-item">
        <div class="legend-swatch" style="background: #ef4444"></div>
        <span>Electrical</span>
      </div>
      <div class="legend-item">
        <div class="legend-swatch" style="background: #06b6d4"></div>
        <span>Plumbing</span>
      </div>
      <div class="legend-item">
        <div class="legend-swatch" style="background: #8b5cf6"></div>
        <span>IT / Low Voltage</span>
      </div>
      <div class="legend-item">
        <div class="legend-swatch" style="background: #10b981"></div>
        <span>Interior Finish</span>
      </div>
    </div>
    <div id="svg-gantt"></div>
    <script>
      const ganttOptions = {
        width: '100%',
        height: 660,
        viewMode: 'week',
        fontFamily: 'Inter, sans-serif',
        fontSize: '12px',
        fontWeight: '500',
        fontColor: '#334155',
        canvasStyle: 'border: 1px solid #e2e8f0; border-radius: 8px; background: #fafafa; box-sizing: border-box;',
        barBorderRadius: '6px',
        barMargin: 4,
        rowBackgroundColors: ['#ffffff', '#f8fafc'],
        enableTaskDrag: true,
        enableTaskResize: true,
        annotations: [
          {
            x1: '07-14-2025',
            x2: '07-18-2025',
            bgColor: 'rgba(239, 68, 68, 0.06)',
            label: {text: 'Code Inspection'},
          },
          {
            x1: '08-29-2025',
            label: {
              text: 'Move-in Day',
              fontColor: '#059669',
            },
          },
        ],
        series: [
          // Phase 1 — Design
          {
            id: 'design',
            startTime: '06-02-2025',
            endTime: '06-20-2025',
            name: 'Design & Permitting',
            progress: 100,
            barBackgroundColor: '#3b82f6',
            barTextColor: '#ffffff',
          },
          {
            id: 'space-plan',
            startTime: '06-02-2025',
            endTime: '06-06-2025',
            name: 'Space planning',
            parentId: 'design',
            progress: 100,
            barBackgroundColor: '#60a5fa',
            barTextColor: '#1e3a5f',
          },
          {
            id: 'arch-drawings',
            startTime: '06-09-2025',
            endTime: '06-16-2025',
            name: 'Architectural drawings',
            parentId: 'design',
            dependency: 'space-plan',
            progress: 100,
            barBackgroundColor: '#60a5fa',
            barTextColor: '#1e3a5f',
          },
          {
            id: 'permits',
            startTime: '06-16-2025',
            endTime: '06-20-2025',
            name: 'Permit application',
            parentId: 'design',
            dependency: 'arch-drawings',
            progress: 100,
            barBackgroundColor: '#93c5fd',
            barTextColor: '#1e3a5f',
          },
          {
            id: 'ms-permits',
            startTime: '06-21-2025',
            name: 'Permits Approved',
            type: 'milestone',
            dependency: 'permits',
          },
          // Phase 2 — Rough-in
          {
            id: 'rough-in',
            startTime: '06-23-2025',
            endTime: '07-18-2025',
            name: 'Rough-In Work',
            progress: 65,
            dependency: 'ms-permits',
            barBackgroundColor: '#f59e0b',
            barTextColor: '#ffffff',
          },
          {
            id: 'demo-walls',
            startTime: '06-23-2025',
            endTime: '06-27-2025',
            name: 'Demo existing walls',
            parentId: 'rough-in',
            progress: 100,
            barBackgroundColor: '#fbbf24',
            barTextColor: '#451a03',
          },
          {
            id: 'framing',
            startTime: '06-30-2025',
            endTime: '07-04-2025',
            name: 'New wall framing',
            parentId: 'rough-in',
            dependency: 'demo-walls',
            progress: 90,
            barBackgroundColor: '#fbbf24',
            barTextColor: '#451a03',
          },
          {
            id: 'elec-rough',
            startTime: '07-07-2025',
            endTime: '07-11-2025',
            name: 'Electrical rough-in',
            parentId: 'rough-in',
            dependency: 'framing',
            progress: 60,
            barBackgroundColor: '#f87171',
            barTextColor: '#450a0a',
          },
          {
            id: 'plumb-rough',
            startTime: '07-07-2025',
            endTime: '07-14-2025',
            name: 'Plumbing rough-in',
            parentId: 'rough-in',
            dependency: 'framing',
            progress: 50,
            barBackgroundColor: '#22d3ee',
            barTextColor: '#083344',
          },
          {
            id: 'low-volt',
            startTime: '07-09-2025',
            endTime: '07-16-2025',
            name: 'Data/AV cabling',
            parentId: 'rough-in',
            dependency: 'framing',
            progress: 40,
            barBackgroundColor: '#a78bfa',
            barTextColor: '#1e1b4b',
          },
          {
            id: 'hvac',
            startTime: '07-14-2025',
            endTime: '07-18-2025',
            name: 'HVAC ductwork',
            parentId: 'rough-in',
            dependency: 'elec-rough',
            progress: 20,
            barBackgroundColor: '#fbbf24',
            barTextColor: '#451a03',
          },
          {
            id: 'ms-inspection',
            startTime: '07-19-2025',
            name: 'Code Inspection',
            type: 'milestone',
            dependency: 'hvac',
          },
          // Phase 3 — Finishes
          {
            id: 'finishes',
            startTime: '07-21-2025',
            endTime: '08-15-2025',
            name: 'Interior Finishes',
            progress: 10,
            dependency: 'ms-inspection',
            barBackgroundColor: '#10b981',
            barTextColor: '#ffffff',
          },
          {
            id: 'drywall',
            startTime: '07-21-2025',
            endTime: '07-25-2025',
            name: 'Drywall & tape',
            parentId: 'finishes',
            progress: 30,
            barBackgroundColor: '#34d399',
            barTextColor: '#064e3b',
          },
          {
            id: 'painting',
            startTime: '07-28-2025',
            endTime: '08-01-2025',
            name: 'Painting',
            parentId: 'finishes',
            dependency: 'drywall',
            progress: 0,
            barBackgroundColor: '#34d399',
            barTextColor: '#064e3b',
          },
          {
            id: 'flooring',
            startTime: '08-04-2025',
            endTime: '08-08-2025',
            name: 'Flooring installation',
            parentId: 'finishes',
            dependency: 'painting',
            progress: 0,
            barBackgroundColor: '#6ee7b7',
            barTextColor: '#064e3b',
          },
          {
            id: 'elec-finish',
            startTime: '08-04-2025',
            endTime: '08-06-2025',
            name: 'Electrical trim-out',
            parentId: 'finishes',
            dependency: 'painting',
            progress: 0,
            barBackgroundColor: '#f87171',
            barTextColor: '#450a0a',
          },
          {
            id: 'plumb-finish',
            startTime: '08-07-2025',
            endTime: '08-11-2025',
            name: 'Plumbing fixtures',
            parentId: 'finishes',
            dependency: 'elec-finish',
            progress: 0,
            barBackgroundColor: '#22d3ee',
            barTextColor: '#083344',
          },
          {
            id: 'furniture',
            startTime: '08-11-2025',
            endTime: '08-15-2025',
            name: 'Furniture & signage',
            parentId: 'finishes',
            dependency: 'flooring',
            progress: 0,
            barBackgroundColor: '#6ee7b7',
            barTextColor: '#064e3b',
          },
          // IT setup
          {
            id: 'it-setup',
            startTime: '08-11-2025',
            endTime: '08-22-2025',
            name: 'IT Setup & Testing',
            progress: 0,
            dependency: 'elec-finish',
            barBackgroundColor: '#8b5cf6',
            barTextColor: '#ffffff',
          },
          {
            id: 'network',
            startTime: '08-11-2025',
            endTime: '08-15-2025',
            name: 'Network equipment',
            parentId: 'it-setup',
            progress: 0,
            barBackgroundColor: '#a78bfa',
            barTextColor: '#1e1b4b',
          },
          {
            id: 'av-install',
            startTime: '08-18-2025',
            endTime: '08-22-2025',
            name: 'Conference room A/V',
            parentId: 'it-setup',
            dependency: 'network',
            progress: 0,
            barBackgroundColor: '#c4b5fd',
            barTextColor: '#1e1b4b',
          },
          // Punchlist & handover
          {
            id: 'punchlist',
            startTime: '08-25-2025',
            endTime: '08-28-2025',
            name: 'Punchlist & final walk',
            progress: 0,
            dependency: 'it-setup',
          },
          {
            id: 'ms-movein',
            startTime: '08-29-2025',
            name: 'Move-in Day',
            type: 'milestone',
            dependency: 'punchlist',
          },
        ],
      };

      const gantt = new ApexGantt(document.getElementById('svg-gantt'), ganttOptions);
      gantt.render();
    </script>
  </body>
</html>
