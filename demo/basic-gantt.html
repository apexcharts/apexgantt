<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Basic Gantt - ApexGantt</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <script src="../apexgantt.min.js"></script>
    <style>
      body {
        max-width: 1000px;
        margin: 0 auto;
        font-family: 'Inter', sans-serif;
        background: #fff;
        padding: 20px 0;
      }
      h2 {
        font-size: 22px;
        font-weight: 700;
        color: #1a1a2e;
        margin: 0 0 4px 0;
        line-height: 1.3;
      }
      .subtitle {
        font-size: 13px;
        color: #6e6e6e;
        margin-bottom: 16px;
      }
    </style>
  </head>
  <body>
    <h2>Basic Gantt</h2>
    <p class="subtitle">
      A basic Gantt chart with task hierarchy, progress tracking, dependencies, and milestones — double-click any cell
      in the task list to edit it inline (name, dates, duration, progress)
    </p>
    <div id="svg-gantt"></div>
    <script>
      const ganttOptions = {
        width: '100%',
        height: 620,
        viewMode: 'week',
        fontFamily: 'Inter, sans-serif',
        fontSize: '12px',
        fontWeight: '500',
        fontColor: '#334155',
        canvasStyle: 'border: 1px solid #e2e8f0; border-radius: 8px; background: #fafafa; box-sizing: border-box;',
        barBorderRadius: '6px',
        barMargin: 8,
        enableInlineEdit: true,
        enableTaskDrag: false,
        enableTaskResize: false,
        series: [
          {
            id: 'demolition',
            name: 'Demolition & Prep',
            progress: 76,
          },
          {
            id: 'demo-kitchen',
            startTime: '03-03-2025',
            endTime: '03-07-2025',
            name: 'Kitchen tear-out',
            parentId: 'demolition',
            progress: 89,
          },
          {
            id: 'demo-bathroom',
            startTime: '03-07-2025',
            endTime: '03-12-2025',
            name: 'Bathroom tear-out',
            parentId: 'demolition',
            dependency: 'demo-kitchen',
            progress: 65,
          },
          {
            id: 'demo-disposal',
            startTime: '03-12-2025',
            endTime: '03-14-2025',
            name: 'Debris removal',
            parentId: 'demolition',
            dependency: 'demo-bathroom',
            progress: 44,
          },
          {
            id: 'structural',
            name: 'Structural Work',
            progress: 80,
          },
          {
            id: 'framing',
            startTime: '03-17-2025',
            endTime: '03-21-2025',
            name: 'Wall framing',
            parentId: 'structural',
            progress: 77,
          },
          {
            id: 'electrical',
            startTime: '03-24-2025',
            endTime: '03-28-2025',
            name: 'Electrical rough-in',
            parentId: 'structural',
            dependency: 'framing',
            progress: 90,
          },
          {
            id: 'plumbing',
            startTime: '03-24-2025',
            endTime: '04-02-2025',
            name: 'Plumbing rough-in',
            parentId: 'structural',
            dependency: 'framing',
            progress: 70,
          },
          {
            id: 'inspection',
            startTime: '04-03-2025',
            name: 'Rough inspection',
            type: 'milestone',
            dependency: 'plumbing',
          },
          {
            id: 'finishes',
            name: 'Finishes',
            progress: 40,
            dependency: 'inspection',
          },
          {
            id: 'drywall',
            startTime: '04-07-2025',
            endTime: '04-11-2025',
            name: 'Drywall & taping',
            parentId: 'finishes',
            progress: 60,
          },
          {
            id: 'painting',
            startTime: '04-14-2025',
            endTime: '04-18-2025',
            name: 'Interior painting',
            parentId: 'finishes',
            dependency: 'drywall',
            progress: 30,
          },
          {
            id: 'flooring',
            startTime: '04-14-2025',
            endTime: '04-22-2025',
            name: 'Flooring installation',
            parentId: 'finishes',
            dependency: 'drywall',
            progress: 20,
          },
          {
            id: 'tile',
            startTime: '04-21-2025',
            endTime: '04-25-2025',
            name: 'Bathroom tile work',
            parentId: 'finishes',
            dependency: 'painting',
            progress: 10,
          },
          {
            id: 'fixtures',
            name: 'Fixture Installation',
            progress: 0,
          },
          {
            id: 'fixtures-kitchen',
            startTime: '04-28-2025',
            endTime: '04-30-2025',
            name: 'Kitchen cabinets & counters',
            parentId: 'fixtures',
            progress: 0,
          },
          {
            id: 'fixtures-bath',
            startTime: '04-30-2025',
            endTime: '05-02-2025',
            name: 'Bathroom vanity & fixtures',
            parentId: 'fixtures',
            dependency: 'fixtures-kitchen',
            progress: 0,
          },
          {
            id: 'final-inspection',
            startTime: '05-05-2025',
            name: 'Final inspection',
            type: 'milestone',
            dependency: 'fixtures',
          },
        ],
      };

      const gantt = new ApexGantt(document.getElementById('svg-gantt'), ganttOptions);
      gantt.render();
    </script>
  </body>
</html>
