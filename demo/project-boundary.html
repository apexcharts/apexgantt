<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Boundary Lines - ApexGantt</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="../apexgantt.min.js"></script>
    <style>
      body {
        max-width: 1100px;
        margin: 0 auto;
        font-family: 'Inter', sans-serif;
        background: #fff;
        padding: 20px 0;
      }
      h2 {
        font-size: 22px;
        font-weight: 700;
        color: #1a1a2e;
        margin: 0 0 4px 0;
      }
      .subtitle {
        font-size: 13px;
        color: #6e6e6e;
        margin-bottom: 16px;
      }
      code {
        background: #f1f5f9;
        color: #0f172a;
        padding: 1px 6px;
        border-radius: 3px;
        font-size: 12px;
        font-family: 'Menlo', monospace;
      }
    </style>
  </head>
  <body>
    <h2>Project boundary lines — span the project's start and end</h2>
    <p class="subtitle">
      Set <code>enableProjectBoundary: true</code> and the chart draws two vertical markers at
      <code>min(startTime)</code> and <code>max(endTime)</code> across every row. They auto-recompute when tasks change.
    </p>

    <div id="svg-gantt"></div>

    <script>
      new ApexGantt(document.getElementById('svg-gantt'), {
        width: '100%',
        height: 380,
        fontFamily: 'Inter, sans-serif',
        rowHeight: 36,
        canvasStyle: 'border: 1px solid #e2e8f0; border-radius: 8px; background: #fafafa;',
        barBorderRadius: '6px',
        enableProjectBoundary: true,
        projectBoundaryColor: '#7C3AED',
        series: [
          {id: 't1', name: 'Discovery', startTime: '03-01-2025', endTime: '03-08-2025', progress: 100},
          {id: 't2', name: 'Wireframes', startTime: '03-09-2025', endTime: '03-15-2025', progress: 80},
          {id: 't3', name: 'Visual design', startTime: '03-16-2025', endTime: '03-25-2025', progress: 55},
          {id: 't4', name: 'Build', startTime: '03-26-2025', endTime: '04-12-2025', progress: 30},
          {id: 't5', name: 'QA', startTime: '04-13-2025', endTime: '04-20-2025', progress: 0},
          {id: 't6', name: 'Launch', startTime: '04-21-2025', endTime: '04-25-2025', progress: 0},
        ],
      }).render();
    </script>
  </body>
</html>
