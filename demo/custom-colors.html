<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Custom Colors - ApexGantt</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <script src="../apexgantt.min.js"></script>
    <style>
      body {
        max-width: 1000px;
        margin: 0 auto;
        font-family: 'Inter', sans-serif;
        background: #fff;
        padding: 20px 0;
      }
      h2 {
        font-size: 22px;
        font-weight: 700;
        color: #1a1a2e;
        margin: 0 0 4px 0;
        line-height: 1.3;
      }
      .subtitle {
        font-size: 13px;
        color: #6e6e6e;
        margin-bottom: 16px;
      }
    </style>
  </head>
  <body>
    <h2>Custom Colors — per-task palette + alternating row backgrounds</h2>
    <p class="subtitle">
      Per-task color customization with <code>barBackgroundColor</code>, <code>barTextColor</code>, and alternating row
      backgrounds via <code>rowBackgroundColors</code> — plus a custom <code>tooltipTemplate</code> with progress bar
    </p>
    <div id="svg-gantt"></div>
    <script>
      const ganttOptions = {
        width: '100%',
        height: 620,
        viewMode: 'week',
        fontFamily: 'Inter, sans-serif',
        fontSize: '12px',
        fontWeight: '500',
        fontColor: '#334155',
        canvasStyle: 'border: 1px solid #e2e8f0; border-radius: 8px; background: #fafafa; box-sizing: border-box;',
        barBorderRadius: '6px',
        barMargin: 4,
        rowBackgroundColors: ['#ffffff', '#f8fafc'],
        arrowColor: '#6366f1',
        enableTaskDrag: false,
        enableTaskResize: false,
        series: [
          // Pre-production — teal
          {
            id: 'pre-prod',
            startTime: '05-05-2025',
            endTime: '05-30-2025',
            name: 'Pre-Production',
            progress: 100,
            barBackgroundColor: '#0d9488',
            barTextColor: '#ffffff',
          },
          {
            id: 'script',
            startTime: '05-05-2025',
            endTime: '05-09-2025',
            name: 'Script finalization',
            parentId: 'pre-prod',
            progress: 100,
            barBackgroundColor: '#14b8a6',
            barTextColor: '#042f2e',
          },
          {
            id: 'storyboard',
            startTime: '05-12-2025',
            endTime: '05-16-2025',
            name: 'Storyboarding',
            parentId: 'pre-prod',
            dependency: 'script',
            progress: 100,
            barBackgroundColor: '#14b8a6',
            barTextColor: '#042f2e',
          },
          {
            id: 'casting',
            startTime: '05-12-2025',
            endTime: '05-21-2025',
            name: 'Casting & auditions',
            parentId: 'pre-prod',
            dependency: 'script',
            progress: 100,
            barBackgroundColor: '#2dd4bf',
            barTextColor: '#042f2e',
          },
          {
            id: 'locations',
            startTime: '05-19-2025',
            endTime: '05-23-2025',
            name: 'Location scouting',
            parentId: 'pre-prod',
            dependency: 'storyboard',
            progress: 100,
            barBackgroundColor: '#2dd4bf',
            barTextColor: '#042f2e',
          },
          {
            id: 'crew-hire',
            startTime: '05-26-2025',
            endTime: '05-30-2025',
            name: 'Crew hiring & contracts',
            parentId: 'pre-prod',
            dependency: 'casting',
            progress: 100,
            barBackgroundColor: '#14b8a6',
            barTextColor: '#042f2e',
          },
          // Production — amber
          {
            id: 'production',
            startTime: '06-02-2025',
            endTime: '06-20-2025',
            name: 'Principal Photography',
            progress: 55,
            barBackgroundColor: '#d97706',
            barTextColor: '#ffffff',
          },
          {
            id: 'shoot-int',
            startTime: '06-02-2025',
            endTime: '06-10-2025',
            name: 'Interior scenes',
            parentId: 'production',
            progress: 80,
            barBackgroundColor: '#f59e0b',
            barTextColor: '#451a03',
          },
          {
            id: 'shoot-ext',
            startTime: '06-11-2025',
            endTime: '06-17-2025',
            name: 'Exterior scenes',
            parentId: 'production',
            dependency: 'shoot-int',
            progress: 40,
            barBackgroundColor: '#fbbf24',
            barTextColor: '#451a03',
          },
          {
            id: 'pickups',
            startTime: '06-18-2025',
            endTime: '06-20-2025',
            name: 'Pick-up shots',
            parentId: 'production',
            dependency: 'shoot-ext',
            progress: 0,
            barBackgroundColor: '#f59e0b',
            barTextColor: '#451a03',
          },
          {
            id: 'wrap',
            startTime: '06-21-2025',
            name: 'Wrap',
            type: 'milestone',
            dependency: 'pickups',
          },
          // Post-production — violet
          {
            id: 'post-prod',
            startTime: '06-23-2025',
            endTime: '07-25-2025',
            name: 'Post-Production',
            progress: 10,
            dependency: 'wrap',
            barBackgroundColor: '#7c3aed',
            barTextColor: '#ffffff',
          },
          {
            id: 'rough-cut',
            startTime: '06-23-2025',
            endTime: '07-03-2025',
            name: 'Rough cut editing',
            parentId: 'post-prod',
            progress: 25,
            barBackgroundColor: '#a78bfa',
            barTextColor: '#1e1b4b',
          },
          {
            id: 'sound-design',
            startTime: '07-07-2025',
            endTime: '07-14-2025',
            name: 'Sound design & score',
            parentId: 'post-prod',
            dependency: 'rough-cut',
            progress: 0,
            barBackgroundColor: '#a78bfa',
            barTextColor: '#1e1b4b',
          },
          {
            id: 'color-grade',
            startTime: '07-14-2025',
            endTime: '07-18-2025',
            name: 'Color grading',
            parentId: 'post-prod',
            dependency: 'sound-design',
            progress: 0,
            barBackgroundColor: '#c4b5fd',
            barTextColor: '#1e1b4b',
          },
          {
            id: 'vfx',
            startTime: '07-07-2025',
            endTime: '07-21-2025',
            name: 'Visual effects',
            parentId: 'post-prod',
            dependency: 'rough-cut',
            progress: 0,
            barBackgroundColor: '#c4b5fd',
            barTextColor: '#1e1b4b',
          },
          {
            id: 'final-cut',
            startTime: '07-21-2025',
            endTime: '07-25-2025',
            name: 'Final cut & master',
            parentId: 'post-prod',
            dependency: 'color-grade',
            progress: 0,
            barBackgroundColor: '#a78bfa',
            barTextColor: '#1e1b4b',
          },
          // Delivery — rose
          {
            id: 'delivery',
            startTime: '07-28-2025',
            endTime: '08-01-2025',
            name: 'Festival Submission',
            progress: 0,
            dependency: 'post-prod',
            barBackgroundColor: '#e11d48',
            barTextColor: '#ffffff',
          },
          {
            id: 'premiere',
            startTime: '08-02-2025',
            name: 'Premiere',
            type: 'milestone',
            dependency: 'delivery',
          },
        ],
        tooltipTemplate(task, dateFormat) {
          const phases = {
            'pre-prod': 'Pre-Production',
            script: 'Pre-Production',
            storyboard: 'Pre-Production',
            casting: 'Pre-Production',
            locations: 'Pre-Production',
            'crew-hire': 'Pre-Production',
            production: 'Production',
            'shoot-int': 'Production',
            'shoot-ext': 'Production',
            pickups: 'Production',
            'post-prod': 'Post-Production',
            'rough-cut': 'Post-Production',
            'sound-design': 'Post-Production',
            'color-grade': 'Post-Production',
            vfx: 'Post-Production',
            'final-cut': 'Post-Production',
            delivery: 'Delivery',
          };
          const phase = phases[task.id] || '';

          if (task.type === 'milestone') {
            return `<div style="background:#1e293b;color:#f1f5f9;padding:10px 14px;border-radius:6px;font-family:Inter,sans-serif;font-size:12px;">
              <div style="font-weight:600;margin-bottom:4px;">${task.name}</div>
              <div style="color:#94a3b8;">${task.startTime}</div>
            </div>`;
          }

          const pct = task.progress ?? 0;
          return `<div style="background:#1e293b;color:#f1f5f9;padding:12px 14px;border-radius:6px;font-family:Inter,sans-serif;max-width:240px;font-size:12px;">
            <div style="font-weight:600;margin-bottom:2px;">${task.name}</div>
            ${phase ? `<div style="color:#94a3b8;font-size:11px;margin-bottom:6px;">${phase}</div>` : ''}
            <div style="color:#cbd5e1;margin-bottom:4px;">Progress: ${pct}%</div>
            <div style="width:100%;background:#334155;border-radius:3px;height:5px;">
              <div style="width:${pct}%;background:${task.barBackgroundColor || '#6366f1'};height:100%;border-radius:3px;"></div>
            </div>
            <div style="color:#64748b;font-size:11px;margin-top:6px;">${task.startTime} \u2013 ${task.endTime || ''}</div>
          </div>`;
        },
      };

      const gantt = new ApexGantt(document.getElementById('svg-gantt'), ganttOptions);
      gantt.render();
    </script>
  </body>
</html>
