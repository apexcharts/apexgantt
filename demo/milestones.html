<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Milestones - ApexGantt</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <script src="../apexgantt.min.js"></script>
    <style>
      body {
        max-width: 1000px;
        margin: 0 auto;
        font-family: 'Inter', sans-serif;
        background: #fff;
        padding: 20px 0;
      }
      h2 {
        font-size: 22px;
        font-weight: 700;
        color: #1a1a2e;
        margin: 0 0 4px 0;
        line-height: 1.3;
      }
      .subtitle {
        font-size: 13px;
        color: #6e6e6e;
        margin-bottom: 16px;
      }
      .legend {
        display: flex;
        gap: 20px;
        margin-bottom: 16px;
        font-size: 12px;
        color: #475569;
      }
      .legend-item {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .legend-bar {
        width: 32px;
        height: 10px;
        border-radius: 3px;
      }
      .legend-diamond {
        width: 10px;
        height: 10px;
        background: #f59e0b;
        transform: rotate(45deg);
      }
    </style>
  </head>
  <body>
    <h2>Milestones</h2>
    <p class="subtitle">
      Milestones mark key decision points and deliverables as diamond markers on the timeline — set
      <code>type: 'milestone'</code> on any task (no <code>endTime</code> needed)
    </p>
    <div class="legend">
      <div class="legend-item">
        <div class="legend-bar" style="background: #3b82f6"></div>
        <span>Regular task</span>
      </div>
      <div class="legend-item">
        <div class="legend-diamond"></div>
        <span>Milestone</span>
      </div>
    </div>
    <div id="svg-gantt"></div>
    <script>
      const ganttOptions = {
        width: '100%',
        height: 640,
        viewMode: 'week',
        fontFamily: 'Inter, sans-serif',
        fontSize: '12px',
        fontWeight: '500',
        fontColor: '#334155',
        canvasStyle: 'border: 1px solid #e2e8f0; border-radius: 8px; background: #fafafa; box-sizing: border-box;',
        barBorderRadius: '6px',
        barMargin: 6,
        enableTaskDrag: false,
        enableTaskResize: false,
        series: [
          // Planning
          {
            id: 'planning',
            startTime: '04-07-2025',
            endTime: '04-18-2025',
            name: 'Release Planning',
            progress: 100,
          },
          {
            id: 'roadmap',
            startTime: '04-07-2025',
            endTime: '04-11-2025',
            name: 'Roadmap review',
            parentId: 'planning',
            progress: 100,
          },
          {
            id: 'scope',
            startTime: '04-14-2025',
            endTime: '04-18-2025',
            name: 'Scope finalization',
            parentId: 'planning',
            dependency: 'roadmap',
            progress: 100,
          },
          {
            id: 'ms-scope-locked',
            startTime: '04-19-2025',
            name: 'Scope Locked',
            type: 'milestone',
            dependency: 'scope',
          },
          // Design
          {
            id: 'design',
            startTime: '04-21-2025',
            endTime: '05-02-2025',
            name: 'UX/UI Design',
            progress: 85,
            dependency: 'ms-scope-locked',
          },
          {
            id: 'wireframes',
            startTime: '04-21-2025',
            endTime: '04-25-2025',
            name: 'Wireframes & user flows',
            parentId: 'design',
            progress: 100,
          },
          {
            id: 'hi-fi',
            startTime: '04-28-2025',
            endTime: '05-02-2025',
            name: 'High-fidelity mockups',
            parentId: 'design',
            dependency: 'wireframes',
            progress: 70,
          },
          {
            id: 'ms-design-approved',
            startTime: '05-03-2025',
            name: 'Design Approved',
            type: 'milestone',
            dependency: 'hi-fi',
          },
          // Development
          {
            id: 'dev',
            startTime: '05-05-2025',
            endTime: '05-30-2025',
            name: 'Development Sprint',
            progress: 50,
            dependency: 'ms-design-approved',
          },
          {
            id: 'auth-flow',
            startTime: '05-05-2025',
            endTime: '05-09-2025',
            name: 'Auth flow redesign',
            parentId: 'dev',
            progress: 90,
          },
          {
            id: 'dashboard',
            startTime: '05-12-2025',
            endTime: '05-16-2025',
            name: 'New dashboard widgets',
            parentId: 'dev',
            dependency: 'auth-flow',
            progress: 60,
          },
          {
            id: 'offline',
            startTime: '05-12-2025',
            endTime: '05-21-2025',
            name: 'Offline mode support',
            parentId: 'dev',
            dependency: 'auth-flow',
            progress: 40,
          },
          {
            id: 'push-notif',
            startTime: '05-19-2025',
            endTime: '05-23-2025',
            name: 'Push notification revamp',
            parentId: 'dev',
            dependency: 'dashboard',
            progress: 20,
          },
          {
            id: 'perf-opt',
            startTime: '05-26-2025',
            endTime: '05-30-2025',
            name: 'Performance optimization',
            parentId: 'dev',
            dependency: 'offline',
            progress: 0,
          },
          {
            id: 'ms-code-complete',
            startTime: '05-31-2025',
            name: 'Code Complete',
            type: 'milestone',
            dependency: 'perf-opt',
          },
          // Testing
          {
            id: 'testing',
            startTime: '06-02-2025',
            endTime: '06-13-2025',
            name: 'QA & Testing',
            progress: 0,
            dependency: 'ms-code-complete',
          },
          {
            id: 'regression',
            startTime: '06-02-2025',
            endTime: '06-06-2025',
            name: 'Regression testing',
            parentId: 'testing',
            progress: 0,
          },
          {
            id: 'device-compat',
            startTime: '06-09-2025',
            endTime: '06-11-2025',
            name: 'Device compatibility',
            parentId: 'testing',
            dependency: 'regression',
            progress: 0,
          },
          {
            id: 'security-audit',
            startTime: '06-11-2025',
            endTime: '06-13-2025',
            name: 'Security audit',
            parentId: 'testing',
            dependency: 'device-compat',
            progress: 0,
          },
          {
            id: 'ms-qa-signoff',
            startTime: '06-14-2025',
            name: 'QA Sign-off',
            type: 'milestone',
            dependency: 'security-audit',
          },
          // Release
          {
            id: 'release',
            startTime: '06-16-2025',
            endTime: '06-20-2025',
            name: 'Release & Rollout',
            progress: 0,
            dependency: 'ms-qa-signoff',
          },
          {
            id: 'staged-rollout',
            startTime: '06-16-2025',
            endTime: '06-18-2025',
            name: 'Staged rollout (10%)',
            parentId: 'release',
            progress: 0,
          },
          {
            id: 'full-rollout',
            startTime: '06-19-2025',
            endTime: '06-20-2025',
            name: 'Full rollout',
            parentId: 'release',
            dependency: 'staged-rollout',
            progress: 0,
          },
          {
            id: 'ms-v2-live',
            startTime: '06-21-2025',
            name: 'v2.0 Live',
            type: 'milestone',
            dependency: 'full-rollout',
          },
        ],
      };

      const gantt = new ApexGantt(document.getElementById('svg-gantt'), ganttOptions);
      gantt.render();
    </script>
  </body>
</html>
