<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dependency Arrows - ApexGantt</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="../apexgantt.min.js"></script>
    <style>
      body {
        max-width: 1100px;
        margin: 0 auto;
        font-family: 'Inter', sans-serif;
        background: #fff;
        padding: 20px 0;
      }
      h2 {
        font-size: 22px;
        font-weight: 700;
        color: #1a1a2e;
        margin: 0 0 4px 0;
      }
      .subtitle {
        font-size: 13px;
        color: #888;
        margin-bottom: 16px;
      }
      .controls {
        display: flex;
        gap: 16px;
        align-items: center;
        margin: 12px 0 18px;
        font-size: 12px;
        color: #475569;
      }
      .controls label {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        cursor: pointer;
      }
      .controls input[type='range'] {
        width: 120px;
      }
      /* Per-arrow CSS classes set by `dependencies.classBuilder`. */
      svg path.dep-cross-stage {
        stroke: #c026d3 !important;
        stroke-dasharray: 6 4;
      }
      svg path.dep-blocked {
        stroke: #dc2626 !important;
      }
    </style>
  </head>
  <body>
    <h2>Dependency Arrows — rounded joints, hit area, tooltips, custom classes</h2>
    <p class="subtitle">
      Hover any arrow to see the from / to / lag tooltip. Cross-stage links (Foundations → Framing) are dashed magenta;
      the blocked QA dependency is solid red. Use the slider to see the corner-radius effect live.
    </p>

    <div class="controls">
      <label>
        Corner radius:
        <input type="range" id="radius" min="0" max="20" value="10" />
        <span id="radius-val">10</span>px
      </label>
      <label>
        Hit width:
        <input type="range" id="hit" min="0" max="20" value="10" />
        <span id="hit-val">10</span>px
      </label>
    </div>

    <div id="svg-gantt"></div>

    <script>
      const escape = window.ApexGantt.escapeHtml;

      const series = [
        {id: 'plan', name: 'Project Planning', startTime: '03-01-2025', endTime: '03-08-2025', progress: 100},
        {
          id: 'site',
          name: 'Site Survey',
          startTime: '03-09-2025',
          endTime: '03-15-2025',
          progress: 100,
          dependency: 'plan',
        },
        {
          id: 'foundation',
          name: 'Foundations',
          startTime: '03-16-2025',
          endTime: '04-05-2025',
          progress: 80,
          dependency: 'site',
        },
        // Cross-stage: foundations → framing (different "stage")
        {
          id: 'framing',
          name: 'Wall Framing',
          startTime: '04-06-2025',
          endTime: '04-20-2025',
          progress: 50,
          dependency: 'foundation',
          stage: 'structural',
        },
        {
          id: 'mep',
          name: 'MEP Rough-In',
          startTime: '04-21-2025',
          endTime: '05-05-2025',
          progress: 20,
          dependency: 'framing',
          stage: 'structural',
        },
        // Blocked: QA can't start until MEP is done — flagged
        {
          id: 'qa',
          name: 'Quality Inspection',
          startTime: '05-06-2025',
          endTime: '05-12-2025',
          progress: 0,
          dependency: 'mep',
          blocked: true,
        },
        {
          id: 'handover',
          name: 'Handover',
          startTime: '05-13-2025',
          endTime: '05-18-2025',
          progress: 0,
          dependency: 'qa',
        },
      ];

      function buildOptions(cornerRadius, hitWidth) {
        return {
          width: '100%',
          height: 460,
          fontFamily: 'Inter, sans-serif',
          fontSize: '13px',
          fontWeight: '500',
          fontColor: '#334155',
          canvasStyle: 'border: 1px solid #e2e8f0; border-radius: 8px; background: #fafafa; box-sizing: border-box;',
          barBorderRadius: '6px',
          barMargin: 6,
          rowHeight: 36,
          dependencies: {
            cornerRadius,
            hitWidth,
            classBuilder: ({fromTask, toTask}) => {
              if (toTask.blocked) return 'dep-blocked';
              if (fromTask.stage !== toTask.stage && (fromTask.stage || toTask.stage)) return 'dep-cross-stage';
              return '';
            },
            tooltipTemplate: ({fromTask, toTask, type, lag}) => `
              <div><strong>${escape(fromTask.name)} → ${escape(toTask.name)}</strong></div>
              <div><strong>Type:</strong> <span>${escape(type)}</span></div>
              <div><strong>Lag:</strong> <span>${lag} day${lag === 1 ? '' : 's'}</span></div>
              ${toTask.blocked ? '<div style="color:#dc2626;font-weight:600">Blocked</div>' : ''}
            `,
          },
          series,
        };
      }

      const host = document.getElementById('svg-gantt');
      let gantt = new ApexGantt(host, buildOptions(10, 10));
      gantt.render();

      const radiusInput = document.getElementById('radius');
      const hitInput = document.getElementById('hit');
      const radiusVal = document.getElementById('radius-val');
      const hitVal = document.getElementById('hit-val');

      function update() {
        const r = parseInt(radiusInput.value, 10);
        const h = parseInt(hitInput.value, 10);
        radiusVal.textContent = r;
        hitVal.textContent = h;
        gantt.update(buildOptions(r, h));
      }

      radiusInput.addEventListener('input', update);
      hitInput.addEventListener('input', update);
    </script>
  </body>
</html>
