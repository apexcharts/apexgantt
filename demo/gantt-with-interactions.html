<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactions - ApexGantt</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <script src="../apexgantt.min.js"></script>
    <style>
      body {
        max-width: 1000px;
        margin: 0 auto;
        font-family: 'Inter', sans-serif;
        background: #fff;
        padding: 20px 0;
      }
      h2 {
        font-size: 22px;
        font-weight: 700;
        color: #1a1a2e;
        margin: 0 0 4px 0;
        line-height: 1.3;
      }
      .subtitle {
        font-size: 13px;
        color: #6e6e6e;
        margin-bottom: 16px;
      }
      #event-log {
        margin-top: 16px;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        background: #f8fafc;
        padding: 12px 16px;
        font-size: 12px;
        max-height: 140px;
        overflow-y: auto;
      }
      #event-log h3 {
        margin: 0 0 8px 0;
        font-size: 13px;
        font-weight: 600;
        color: #475569;
      }
      .log-entry {
        padding: 4px 0;
        border-bottom: 1px solid #f1f5f9;
        color: #334155;
        font-family: 'Inter', monospace;
      }
      .log-entry:last-child {
        border-bottom: none;
      }
      .log-entry .tag {
        display: inline-block;
        padding: 1px 6px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 600;
        margin-right: 6px;
      }
      .tag-drag {
        background: #dbeafe;
        color: #1d4ed8;
      }
      .tag-resize {
        background: #fce7f3;
        color: #be185d;
      }
      .tag-edit {
        background: #dcfce7;
        color: #15803d;
      }
      .empty-log {
        color: #94a3b8;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <h2>Interactions — drag, resize, and inline edit</h2>
    <p class="subtitle">
      Drag tasks to reschedule, resize to adjust duration, or double-click to edit — all updates are logged below
      (<code>enableTaskDrag</code>, <code>enableTaskResize</code>, <code>enableTaskEdit</code>)
    </p>
    <div id="svg-gantt"></div>
    <div id="event-log">
      <h3>Activity Log</h3>
      <div class="empty-log">Drag, resize, or edit a task to see events here</div>
    </div>
    <script>
      const ganttOptions = {
        width: '100%',
        height: 540,
        viewMode: 'week',
        fontFamily: 'Inter, sans-serif',
        fontSize: '12px',
        fontWeight: '500',
        fontColor: '#334155',
        canvasStyle: 'border: 1px solid #e2e8f0; border-radius: 8px; background: #fafafa; box-sizing: border-box;',
        barBorderRadius: '6px',
        barMargin: 8,
        enableTaskDrag: true,
        enableTaskResize: true,
        enableTaskEdit: true,
        enableTooltip: true,
        series: [
          {
            id: 'venue',
            startTime: '06-02-2025',
            endTime: '06-20-2025',
            name: 'Venue & Logistics',
            progress: 70,
          },
          {
            id: 'venue-search',
            startTime: '06-02-2025',
            endTime: '06-06-2025',
            name: 'Venue shortlisting',
            parentId: 'venue',
            progress: 100,
          },
          {
            id: 'venue-contract',
            startTime: '06-09-2025',
            endTime: '06-11-2025',
            name: 'Contract negotiation',
            parentId: 'venue',
            dependency: 'venue-search',
            progress: 80,
          },
          {
            id: 'av-setup',
            startTime: '06-12-2025',
            endTime: '06-18-2025',
            name: 'A/V equipment booking',
            parentId: 'venue',
            dependency: 'venue-contract',
            progress: 40,
          },
          {
            id: 'catering',
            startTime: '06-16-2025',
            endTime: '06-20-2025',
            name: 'Catering arrangements',
            parentId: 'venue',
            dependency: 'venue-contract',
            progress: 30,
          },
          {
            id: 'speakers',
            startTime: '06-09-2025',
            endTime: '07-04-2025',
            name: 'Speaker Program',
            progress: 55,
          },
          {
            id: 'cfp',
            startTime: '06-09-2025',
            endTime: '06-20-2025',
            name: 'Call for proposals',
            parentId: 'speakers',
            progress: 100,
          },
          {
            id: 'review',
            startTime: '06-23-2025',
            endTime: '06-27-2025',
            name: 'Proposal review',
            parentId: 'speakers',
            dependency: 'cfp',
            progress: 50,
          },
          {
            id: 'schedule-build',
            startTime: '06-30-2025',
            endTime: '07-04-2025',
            name: 'Build talk schedule',
            parentId: 'speakers',
            dependency: 'review',
            progress: 10,
          },
          {
            id: 'marketing',
            startTime: '06-16-2025',
            endTime: '07-18-2025',
            name: 'Marketing & Outreach',
            progress: 35,
          },
          {
            id: 'website',
            startTime: '06-16-2025',
            endTime: '06-25-2025',
            name: 'Event website launch',
            parentId: 'marketing',
            progress: 60,
          },
          {
            id: 'social',
            startTime: '06-23-2025',
            endTime: '07-11-2025',
            name: 'Social media campaign',
            parentId: 'marketing',
            dependency: 'website',
            progress: 25,
          },
          {
            id: 'email-blast',
            startTime: '07-07-2025',
            endTime: '07-18-2025',
            name: 'Email outreach waves',
            parentId: 'marketing',
            dependency: 'social',
            progress: 0,
          },
          {
            id: 'registration-open',
            startTime: '06-26-2025',
            name: 'Registration opens',
            type: 'milestone',
            dependency: 'website',
          },
          {
            id: 'rehearsal',
            startTime: '07-21-2025',
            endTime: '07-23-2025',
            name: 'Dry run & rehearsal',
            progress: 0,
            dependency: 'schedule-build',
          },
          {
            id: 'conference-day',
            startTime: '07-25-2025',
            name: 'Conference Day',
            type: 'milestone',
            dependency: 'rehearsal',
          },
        ],
      };

      const el = document.getElementById('svg-gantt');
      const gantt = new ApexGantt(el, ganttOptions);
      gantt.render();

      const logEl = document.getElementById('event-log');
      let hasEntries = false;

      function addLog(tag, tagClass, message) {
        if (!hasEntries) {
          logEl.querySelector('.empty-log')?.remove();
          hasEntries = true;
        }
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        entry.innerHTML = `<span class="tag ${tagClass}">${tag}</span>${message}`;
        logEl.appendChild(entry);
        logEl.scrollTop = logEl.scrollHeight;
      }

      el.addEventListener('taskDragged', (e) => {
        const t = e.detail.updatedTask;
        addLog('DRAG', 'tag-drag', `"${t.name}" moved to ${t.startTime} \u2013 ${t.endTime}`);
      });

      el.addEventListener('taskResized', (e) => {
        const t = e.detail.updatedTask;
        addLog('RESIZE', 'tag-resize', `"${t.name}" now ends ${t.endTime}`);
      });

      el.addEventListener('taskUpdateSuccess', (e) => {
        const t = e.detail.updatedTask;
        addLog('EDIT', 'tag-edit', `"${t.name}" updated`);
      });
    </script>
  </body>
</html>
